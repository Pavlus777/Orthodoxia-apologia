        a:`<p>Внешнее сходство (определённый день года связан с определённым почитаемым именем) действительно есть, но смысл этой связи принципиально иной. В языческом календаре день, посвящённый конкретному богу, — это, как правило, день его культового празднования, требующий определённых обрядов для снискания его благосклонности в соответствующей сфере (урожай, война, любовь) — то есть сама структура календаря отражает разделение сфер влияния между разными божествами.</p>
        <p>День памяти святого в православном календаре, напротив, почти всегда — это день его смерти (или иногда обретения мощей) — то есть день не земного триумфа, а часто мученической кончины, воспринимаемой как «день рождения» для вечной жизни. Молитва святому в этот день — это не заклинание конкретного локального покровителя для получения выгоды в закреплённой за ним «сфере», а прошение о его молитвенном ходатайстве перед Единым Богом за живущих (ср. Иак. 5:16: «много может усиленная молитва праведного»), причём это ходатайство принципиально не альтернативно и не конкурентно молитве, обращённой напрямую к Самому Богу, а дополнительно к ней, — то есть за разнообразием имён и дат в православном календаре стоит не разделение Божественной власти между множеством самостоятельных сил, а единое обращение всей Церкви, земной и небесной, к Одному Богу.</p>`

        a:`<p>Ряд течений (от древнего арианства до современных Свидетелей Иеговы и других антитринитарных групп) утверждает, что Иисус — сотворённое, хотя и высшее творение, но не единосущный Отцу Бог. Православное богословие отвечает на это рядом библейских и логических аргументов.</p>
        <p><strong>Прямые новозаветные свидетельства.</strong> Евангелие от Иоанна открывается словами: «В начале было Слово, и Слово было у Бога, и Слово было Бог... Всё через Него начало быть, и без Него ничто не начало быть, что начало быть» (Ин. 1:1,3) — Слово (Логос) не только пребывает «у Бога», но само есть Бог, и через Него сотворено всё существующее, что исключает Его собственную тварность (иначе Он оказался бы сотворён Самим Собой). Апостол Фома, увидев воскресшего Христа, восклицает: «Господь мой и Бог мой!» (Ин. 20:28) — и Христос не порицает его за это исповедание, а принимает его. Апостол Павел пишет о Христе: «в Нём обитает вся полнота Божества телесно» (Кол. 2:9) и называет Его «великим Богом и Спасителем нашим Иисусом Христом» (Тит. 2:13).</p>

      {
        q: "Проблема зла: если Бог всеблаг и всемогущ, откуда в мире зло? (Парадокс Эпикура)",
        a:`<p>Классическая формулировка, приписываемая античному философу Эпикуру (и известная в передаче церковного писателя Лактанция), звучит так: если Бог хочет предотвратить зло, но не может — Он не всемогущ; если может, но не хочет — Он не благ; если может и хочет — откуда тогда зло; если не может и не хочет — зачем называть Его Богом.</p>
        <p>Православное богословие отвечает на это различением двух видов зла и рядом взаимодополняющих аргументов.</p>
        <p><strong>Свобода воли.</strong> Значительная часть зла в мире — нравственное зло (война, убийство, ложь, притеснение) — есть прямое следствие злоупотребления свободой воли, данной Богом разумным творениям (ангелам и людям) как необходимое условие подлинной любви и добродетели: любовь, принуждённая извне, не была бы любовью. Бог, создавая свободных существ, тем самым допускает — не как желаемое, но как логически неизбежное следствие самой свободы — возможность её злоупотребления. Устранить эту возможность значило бы устранить саму свободу, а вместе с ней и возможность подлинного нравственного добра.</p>
        <p><strong>Повреждение природы (первородный грех).</strong> Значительная часть так называемого «естественного зла» (болезни, стихийные бедствия, смерть) осмысляется православным богословием как следствие повреждения самой природы творения через грехопадение — мир, по слову апостола Павла, «покорился суете... в надежде, что и сама тварь освобождена будет от рабства тлению» (Рим. 8:20–21), то есть нынешнее состояние природы не тождественно тому состоянию, в котором она была задумана Творцом, и не будет тождественно тому состоянию, в котором она будет восстановлена в конце времён.</p>
        <p><strong>Бог не остаётся вне страдания.</strong> В отличие от деистического представления о безучастном божестве, христианство утверждает, что Сам Бог во Христе добровольно вошёл в самую глубину человеческого страдания и смерти на Кресте — не устранил зло внешним, магическим актом, а разделил его изнутри, чтобы изнутри же его победить Воскресением. Как писал православный богослов митрополит Каллист (Уэр), крест не даёт интеллектуального «объяснения», снимающего тайну страдания, но даёт нечто большее — присутствие Самого Бога рядом со страждущим и обетование, что последнее слово принадлежит не смерти, а жизни.</p>
        <p><strong>Эпистемическая скромность.</strong> Наконец, ряд современных философов религии (например, Элвин Плантинга в его «защите свободной воли») указывает, что для логической состоятельности веры в благого и всемогущего Бога не требуется, чтобы человек знал конкретную причину каждого отдельного случая зла — достаточно показать, что само существование зла логически совместимо с существованием благого Бога, обладающего благими причинами (пусть и не всегда доступными конечному человеческому разуму) для допущения временного попущения зла ради большего блага, включая нетленную свободу и вечную славу искупленного творения.</p>`

        a:`<p>Православное богословие действительно учит, что душа после смерти проходит частный (индивидуальный) суд и получает предварительное определение своей участи, однако одновременно утверждает, что это состояние — не окончательное в полном смысле: окончательный и всеобщий приговор, соединённый с воскресением тела, совершится лишь на Страшном Суде в конце времён (ср. Ин. 5:28–29). Молитва Церкви за усопших основывается именно на этом промежуточном, ещё не окончательно завершённом состоянии — Церковь верит, что усердная молитва живых способна облегчить участь усопшего и содействовать его помилованию, особенно применительно к тем, кто отошёл с покаянием, но не успел принести полных плодов этого покаяния при жизни.</p>

        <p><strong>Семь Вселенских Соборов без изменений.</strong> Православная Церковь исповедует то же самое вероучение, которое было соборно сформулировано семью Вселенскими Соборами (325–787 гг.) — Никейским, Константинопольским, Эфесским, Халкидонским и последующими, — не добавляя и не убирая из него ничего впоследствии. Католическая Церковь после разделения 1054 года в одностороннем порядке ввела ряд новых догматов, которых не знала неразделённая Церковь первого тысячелетия: добавление «Филиокве» к Символу веры (об исхождении Духа «и от Сына» — сам текст Символа был утверждён II Вселенским Собором именно с формулировкой «от Отца исходящего», и любое изменение соборно принятого текста без нового Вселенского Собора православная традиция считает неканоничным), догмат о папской непогрешимости (провозглашён I Ватиканским Собором в 1870 году), догмат о непорочном зачатии Девы Марии (1854 год) и о Её телесном вознесении (1950 год) — то есть на протяжении столетий после разрыва с православием западное христианство продолжало вводить новые обязательные догматы решением одного центра, чего не делала православная Церковь.</p>

        <p>Христианство, в этом смысле, стало историческим ответом на этот философский поиск: оно устранило множество мелких «посредников» между человеком и высшим Началом, «десакрализовало» природный мир (лес стал просто лесом, а не обиталищем духов, что впоследствии открыло возможность для его беспрепятственного научного изучения как творения, подчинённого разумному порядку) и заменило хаос капризных, конкурирующих сил единым, разумным и благим Логосом. «Слушай, Израиль: Господь Бог наш есть Господь единый» (Мк. 12:29) — в этом единстве, по христианскому пониманию, залог не только богословской истины, но и целостности самого человеческого сознания, которое политеизм, вынуждая служить сразу нескольким противоречащим друг другу «господам», неизбежно раздробляет и разрывает изнутри.</p>`
      }
    ]
  }
};

function render(){
  document.querySelectorAll('#mainnav button').forEach(b=>b.classList.toggle('active', b.dataset.r===state.route));
  const app = document.getElementById('app');
  if(state.route==='home') return renderHome(app);
  if(state.route==='bible') return renderBible(app);
  if(state.route==='refutations') return renderRefutations(app);
  if(state.route==='glossary') return renderGlossary(app);
  if(state.route==='calendar') return renderCalendar(app);
  if(SECTIONS[state.route]) return renderSection(app, state.route);
  app.innerHTML = '';
}

      <div class="ru-label">Церковный календарь</div>
      <div class="ref-subtabs">
        ${tabs.map(([k,label])=>`<button data-cal="${k}" class="${state.calTab===k?'active':''}">${label}</button>`).join('')}
      </div>
      <h1 style="color:var(--gold-bright);text-shadow:none;">CALENDARIUM</h1>
      <p>${s.desc}</p>
    </div>
    <div class="qa-wrap">
      ${s.items.map((it,i)=>`
        <div class="qa-item" data-i="${i}">
          <div class="qa-q"><span class="num">${String(i+1).padStart(2,'0')}</span><h4>${it.q}</h4><span class="toggle">+</span></div>
          <div class="qa-a"><div class="qa-a-inner">${it.a}</div></div>
        </div>`).join('')}
    </div>
  `;
  app.querySelector('.ref-subtabs').addEventListener('click', e=>{
    if(e.target.dataset.cal){ state.calTab = e.target.dataset.cal; renderCalendar(app); window.scrollTo({top:0,behavior:'smooth'}); }
  });
  app.querySelectorAll('.qa-item').forEach(el=>{
    el.querySelector('.qa-q').addEventListener('click', ()=> el.classList.toggle('open'));
  });
}

function letterBg(chars, testamentClass){
  let out = `<div class="letters-bg">`;
  for(let i=0;i<420;i++){
    const ch = chars[Math.floor(Math.random()*chars.length)];
    const top = Math.random()*100, left = Math.random()*100, size = 1+Math.random()*2.6, rot = Math.random()*360;
    out += `<span style="top:${top}%;left:${left}%;font-size:${size}rem;transform:rotate(${rot}deg);">${ch}</span>`;
  }
  return out + `</div>`;
}
const GREEK = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩαβγδεζηθικλμνξοπρστυφχψω".split('');
const HEBREW = "אבגדהוזחטיכלמנסעפצקרשת".split('');

function renderBible(app){
  const test = state.testament;
  const trans = state.translation;
  const booksOfTestament = BOOKS.filter(b=>b.t===test);
  if(!booksOfTestament.some(b=>b.id===state.book)) state.book = booksOfTestament[0].id;
  const bg = test==='nt' ? letterBg(GREEK) : letterBg(HEBREW);

  app.innerHTML = `
    <div class="bible-shell ${test}">
      ${bg}
      <div class="bible-topbar">
        <div class="testbtns">
          <button data-t="ot" class="${test==='ot'?'active':''}">Ветхий Завет</button>
          <button data-t="nt" class="${test==='nt'?'active':''}">Новый Завет</button>
        </div>
        <div class="trans-dropdown" id="transDropdown">
          <button class="trans-toggle" id="transToggle"><span class="trans-toggle-label">${TRANSLATION_LABELS[trans]}</span> <span class="arrow">▾</span></button>
          <div class="trans-menu">
            <button data-tr="synod" class="${trans==='synod'?'active':''}">${TRANSLATION_LABELS.synod}</button>
            <button data-tr="nrt" class="${trans==='nrt'?'active':''}">${TRANSLATION_LABELS.nrt}</button>
            <button data-tr="by" class="${trans==='by'?'active':''}">${TRANSLATION_LABELS.by}</button>
            <button data-tr="ukr" class="${trans==='ukr'?'active':''}">${TRANSLATION_LABELS.ukr}</button>
            <button data-tr="grc" class="${trans==='grc'?'active':''}">${TRANSLATION_LABELS.grc}</button>
            <button data-tr="lat" class="${trans==='lat'?'active':''}">${TRANSLATION_LABELS.lat}</button>
            <button data-tr="heb" class="${trans==='heb'?'active':''}">${TRANSLATION_LABELS.heb}</button>
            <button data-tr="kjv" class="${trans==='kjv'?'active':''}">${TRANSLATION_LABELS.kjv}</button>
          </div>
        </div>
      </div>
      <div class="bible-selects">
        <select id="bookSelect"></select>
        <select id="chapterSelect"></select>
      </div>
      <div class="chapter-wrap" id="chapterWrap"></div>
    </div>
  `;
  app.querySelector('.testbtns').addEventListener('click', e=>{
    if(e.target.dataset.t){ state.testament=e.target.dataset.t; state.chapter=1; renderBible(app); }
  });
  const transDropdown = document.getElementById('transDropdown');
  document.getElementById('transToggle').addEventListener('click', e=>{
    e.stopPropagation();
    transDropdown.classList.toggle('open');
  });
  transDropdown.querySelector('.trans-menu').addEventListener('click', e=>{
    if(e.target.dataset.tr){
      state.translation = e.target.dataset.tr;
      transDropdown.classList.remove('open');
      loadChapter();
      document.getElementById('transToggle').innerHTML = `<span class="trans-toggle-label">${TRANSLATION_LABELS[state.translation]}</span> <span class="arrow">▾</span>`;
      transDropdown.querySelectorAll('.trans-menu button').forEach(b=>b.classList.toggle('active', b.dataset.tr===state.translation));
    }
  });

  const bookSelect = document.getElementById('bookSelect');
  bookSelect.innerHTML = booksOfTestament.map(b=>`<option value="${b.id}" ${b.id===state.book?'selected':''}>${b.name}</option>`).join('');
  bookSelect.onchange = ()=>{
    state.book = +bookSelect.value;
    state.chapter = 1;
    populateChapterSelect();
    loadChapter();
  };

  populateChapterSelect();
  loadChapter();
}

function populateChapterSelect(){
  const chapterSelect = document.getElementById('chapterSelect');
  const book = BOOKS.find(b=>b.id===state.book);
  if(!book || !chapterSelect) return;
  if(!state.chapter || state.chapter > book.chapters) state.chapter = 1;
  let opts = '';
  for(let c=1;c<=book.chapters;c++){
    opts += `<option value="${c}" ${c===state.chapter?'selected':''}>Глава ${c}</option>`;
  }
  chapterSelect.innerHTML = opts;
  chapterSelect.onchange = ()=>{
    state.chapter = +chapterSelect.value;
    loadChapter();
  };
}

/* Extracts plain text from a helloao.org verse content array
   (strings, {text}, {heading}, {lineBreak}, {noteId} — footnote refs skipped) */
function extractHelloaoVerseText(contentArr){
  return contentArr.map(item=>{
    if(typeof item === 'string') return item;
    if(item && typeof item.text === 'string') return item.text;
    if(item && typeof item.heading === 'string') return item.heading;
    return '';
  }).join(' ').replace(/\s+/g,' ').trim();
}

function renderVerses(wrap, book, verses){
  wrap.classList.toggle('rtl', state.translation === 'heb');
  if(!verses.length){
    wrap.innerHTML = `<div class="missing-note">Текст этой главы не найден.</div>`;
    return;
  }
  let html = `<h2>${book.name}</h2><div class="chapter-sub">Глава ${state.chapter} · ${TRANSLATION_LABELS[state.translation]}</div>`;
  verses.forEach((v, idx)=>{
    const text = v.text;
    if(idx===0 && text.length){
      const first = text.charAt(0);
      const rest = text.slice(1);
      html += `<div class="verse"><span class="vnum">${v.verse}</span><span class="dropcap">${first}</span>${rest}</div>`;
    } else {
      html += `<div class="verse"><span class="vnum">${v.verse}</span>${text}</div>`;
    }
  });
  wrap.innerHTML = html;
}

async function loadChapter(){
  const wrap = document.getElementById('chapterWrap');
  if(!wrap) return;
  const book = BOOKS.find(b=>b.id===state.book);
  wrap.classList.toggle('rtl', state.translation === 'heb');
  wrap.innerHTML = `<div class="missing-note">Загрузка…</div>`;

  try{
    if(state.translation === 'by'){
      /* Belarusian — А. Бокун, 2023, полная Библия, через bible.helloao.org */
      const url = `https://bible.helloao.org/api/bel_jfc/${book.usfm}/${state.chapter}.json`;
      const resp = await fetch(url);
      if(!resp.ok) throw new Error('http-' + resp.status);
      const data = await resp.json();
      const verses = (data.chapter?.content || [])
        .filter(c => c.type === 'verse')
        .map(v => ({ verse: v.number, text: extractHelloaoVerseText(v.content) }));
      renderVerses(wrap, book, verses);
      return;
    }

    /* Синодальный / Новый русский / Украинский / Латынь — через bolls.life,
       у всех этих переводов нумерация книг 1–66 совпадает с BOOKS */
    let code = TRANSLATIONS[state.translation];

    /* Греческий — особый случай: единого перевода на весь канон нет,
       используем LXX (Септуагинту) для Ветхого Завета и Textus Receptus для Нового —
       именно такую пару греческих текстов исторически использует Православие */
    if(state.translation === 'grc'){
      code = (book.t === 'ot') ? 'LXX' : 'TR';
    }
    /* Иврит — та же логика: WLC (масоретский текст) для Ветхого Завета,
       перевод Делича (DHNT) для Нового Завета, которого в оригинале на иврите не было */
    if(state.translation === 'heb'){
      code = (book.t === 'ot') ? 'WLC' : 'DHNT';
    }

    const url = `https://bolls.life/get-text/${code}/${state.book}/${state.chapter}/`;
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('http-' + resp.status);
    const data = await resp.json();
    const verses = Array.isArray(data)
      ? data.map(v => ({ verse: v.verse, text: (v.text || '').replace(/<[^>]+>/g,'') }))
      : [];
    renderVerses(wrap, book, verses);
  }catch(err){
    wrap.innerHTML = `<div class="missing-note">Не удалось загрузить текст главы — нет подключения к интернету или сервис временно недоступен. Проверьте соединение и попробуйте снова, выбрав главу заново.</div>`;
  }
}

  const dd = document.getElementById('transDropdown');
  if(dd) dd.classList.remove('open');
});

document.getElementById('mainnav').addEventListener('click', e=>{
