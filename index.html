<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΟΡΘΟΔΟΞΙΑ.ΑΠΟΛΟΓΙΑ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700;900&family=Yeseva+One&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0908;
    --bg-raised: #121110;
    --ink: #eae4d6;
    --ink-dim: #a89f8c;
    --gold: #b6893f;
    --gold-bright: #d9ab5c;
    --wine: #5c1418;
    --wine-bright: #7c1c22;
    --hair: #2c2822;
    --serif-display: 'Yeseva One', 'Cinzel', serif;
    --serif-latin: 'Cinzel', serif;
    --serif-body: 'PT Serif', Georgia, serif;
    --serif-verse: 'Cormorant Garamond', 'PT Serif', serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--serif-body);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  ::selection{background:var(--wine);color:var(--ink);}

  /* ---------- layout shell ---------- */
  .shell{min-height:100vh;display:flex;flex-direction:column;}
  header.top{
    position:sticky;top:0;z-index:50;
    background:linear-gradient(180deg, rgba(10,9,8,.97), rgba(10,9,8,.88));
    border-bottom:1px solid var(--hair);
    backdrop-filter: blur(6px);
  }
  .top-inner{
    max-width:1180px;margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
  }
  .brand{
    font-family:var(--serif-latin);
    letter-spacing:.14em;
    font-size:1.05rem;
    font-weight:700;
    color:var(--gold-bright);
    cursor:pointer;
    display:flex;align-items:center;gap:10px;
  }
  .brand .cross{color:var(--gold);font-size:1.1em;}
  nav.mainnav{display:flex;gap:2px;flex-wrap:wrap;}
  nav.mainnav button{
    background:none;border:none;color:var(--ink-dim);
    font-family:var(--serif-body);font-size:.92rem;letter-spacing:.02em;
    padding:8px 12px;cursor:pointer;border-radius:2px;
    transition:color .15s ease, background .15s ease;
  }
  nav.mainnav button:hover{color:var(--ink);background:var(--bg-raised);}
  nav.mainnav button.active{color:var(--gold-bright);}

  main{flex:1;}
  footer.site-footer{
    border-top:1px solid var(--hair);
    padding:36px 24px 48px;
    text-align:center;
    color:var(--ink-dim);
    font-size:.85rem;
  }
  footer.site-footer .fbrand{
    font-family:var(--serif-latin);letter-spacing:.12em;color:var(--gold);
    display:block;margin-bottom:10px;font-size:.95rem;
  }
  footer.site-footer .fverse{font-style:italic;color:var(--ink-dim);}

  .ornament{
    text-align:center;color:var(--gold);opacity:.75;margin:28px 0;
    font-size:1.3rem;letter-spacing:.5em;
  }

  /* ---------- HOME ---------- */
  .hero{
    position:relative;
    padding:120px 24px 100px;
    text-align:center;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(182,137,63,.10), transparent 55%),
      var(--bg);
  }
  .hero::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      linear-gradient(var(--hair) 1px, transparent 1px),
      linear-gradient(90deg, var(--hair) 1px, transparent 1px);
    background-size:64px 64px;
    opacity:.15;
    mask-image:radial-gradient(ellipse at 50% 20%, black, transparent 70%);
  }
  .hero-eyebrow{
    position:relative;font-family:var(--serif-latin);letter-spacing:.35em;
    color:var(--gold);font-size:.78rem;text-transform:uppercase;margin-bottom:22px;
  }
  .hero-title{
    position:relative;
    font-family:var(--serif-display);
    font-size:clamp(2.4rem, 6vw, 4.6rem);
    color:var(--ink);
    margin:0 0 8px;
    letter-spacing:.02em;
    text-shadow:0 0 40px rgba(182,137,63,.15);
  }
  .hero-title .dot{color:var(--gold);}
  .hero-sub{
    position:relative;color:var(--ink-dim);font-size:1.05rem;
    max-width:560px;margin:0 auto 46px;letter-spacing:.02em;
  }
  .hero-verse{
    position:relative;max-width:720px;margin:0 auto;
    font-family:var(--serif-verse);font-style:italic;
    font-size:clamp(1.3rem, 2.6vw, 1.7rem);
    color:var(--ink);line-height:1.6;
    border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);
    padding:34px 10px;
  }
  .hero-verse cite{
    display:block;font-style:normal;font-family:var(--serif-latin);
    font-size:.8rem;letter-spacing:.2em;color:var(--gold);margin-top:18px;
  }

  .home-grid{
    max-width:1180px;margin:0 auto;padding:20px 24px 90px;
    display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;
  }
  .card{
    background:var(--bg-raised);border:1px solid var(--hair);
    padding:30px 26px;cursor:pointer;position:relative;
    transition:border-color .2s ease, transform .2s ease;
  }
  .card:hover{border-color:var(--gold);transform:translateY(-3px);}
  .card .card-latin{
    font-family:var(--serif-latin);letter-spacing:.16em;color:var(--gold);
    font-size:.72rem;text-transform:uppercase;margin-bottom:14px;display:block;
  }
  .card h3{font-family:var(--serif-display);font-weight:400;font-size:1.3rem;margin:0 0 10px;color:var(--ink);}
  .card p{color:var(--ink-dim);font-size:.9rem;margin:0;}
  .card .n{
    position:absolute;top:26px;right:26px;color:var(--hair);
    font-family:var(--serif-latin);font-size:1.6rem;font-weight:700;
  }

  /* ---------- SECTION (CONTRA pages) ---------- */
  .section-head{
    padding:70px 24px 40px;text-align:center;
    border-bottom:1px solid var(--hair);
    background:linear-gradient(180deg, rgba(92,20,24,.08), transparent);
  }
  .section-head .ru-label{color:var(--ink-dim);font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;}
  .section-head h1{
    font-family:var(--serif-latin);font-weight:900;
    font-size:clamp(2rem,5vw,3.2rem);letter-spacing:.08em;
    color:#c53434;margin:0 0 16px;
    text-shadow:0 0 30px rgba(197,52,52,.35);
  }
  .section-head p{max-width:600px;margin:0 auto;color:var(--ink-dim);font-size:.95rem;}

  .ref-subtabs{display:flex;justify-content:center;gap:8px;margin-bottom:26px;flex-wrap:wrap;}
  .ref-subtabs button{
    background:var(--bg-raised);border:1px solid var(--hair);color:var(--ink-dim);
    padding:9px 18px;font-family:var(--serif-body);font-size:.9rem;cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .ref-subtabs button:hover{color:var(--ink);}
  .ref-subtabs button.active{border-color:#c53434;color:#d9605f;}

  .qa-wrap{max-width:840px;margin:0 auto;padding:50px 24px 100px;}
  .qa-item{border-bottom:1px solid var(--hair);}
  .qa-q{
    display:flex;align-items:baseline;gap:16px;
    padding:26px 4px;cursor:pointer;user-select:none;
  }
  .qa-q .num{font-family:var(--serif-latin);color:var(--gold);font-size:.85rem;min-width:28px;}
  .qa-q h4{font-family:var(--serif-body);font-weight:700;font-size:1.12rem;margin:0;color:var(--ink);flex:1;}
  .qa-q .toggle{color:var(--gold);font-size:1.2rem;transition:transform .2s ease;}
  .qa-item.open .qa-q .toggle{transform:rotate(45deg);}
  .qa-a{
    max-height:0;overflow:hidden;transition:max-height .35s ease;
  }
  .qa-item.open .qa-a{max-height:4000px;}
  .qa-a-inner{padding:0 4px 34px 44px;color:var(--ink);font-size:1rem;}
  .qa-a-inner p{margin:0 0 16px;}
  .qa-a-inner strong{color:var(--gold-bright);}
  .qa-a-inner .verse-block{
    border-left:2px solid var(--gold);padding:6px 0 6px 18px;margin:16px 0;
    font-style:italic;color:var(--ink-dim);
  }

  /* ---------- BIBLE ---------- */
  .bible-shell{position:relative;min-height:70vh;}
  .bible-shell.ot{background:var(--bg);}
  .bible-shell.nt{background:var(--bg);}
  .letters-bg{
    position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;
    opacity:.1;
  }
  .letters-bg span{
    position:absolute;font-family:'PT Serif', serif;color:var(--gold);
  }
  .bible-topbar{
    position:relative;z-index:15;
    max-width:1000px;margin:0 auto;padding:34px 24px 10px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
  }
  .transbtns{display:flex;gap:8px;}
  .transbtns button{
    background:var(--bg-raised);border:1px solid var(--hair);color:var(--ink-dim);
    padding:8px 14px;font-family:var(--serif-body);font-size:.85rem;cursor:pointer;
  }
  .transbtns button.active{border-color:var(--gold);color:var(--gold-bright);}

  .trans-dropdown{position:relative;}
  .trans-toggle{
    background:var(--bg-raised);border:1px solid var(--gold);color:var(--gold-bright);
    padding:8px 16px;font-family:var(--serif-body);font-size:.85rem;cursor:pointer;
    display:flex;align-items:center;gap:8px;
  }
  .trans-toggle .arrow{font-size:.7rem;transition:transform .2s ease;pointer-events:none;}
  .trans-toggle-label{pointer-events:none;}
  .trans-dropdown.open .trans-toggle .arrow{transform:rotate(180deg);}
  .trans-menu{
    position:absolute;top:calc(100% + 6px);left:0;z-index:20;
    background:var(--bg-raised);border:1px solid var(--hair);
    min-width:280px;display:none;flex-direction:column;
    box-shadow:0 12px 30px rgba(0,0,0,.5);
  }
  .trans-dropdown.open .trans-menu{display:flex;}
  .trans-menu button{
    background:none;border:none;color:var(--ink-dim);text-align:left;
    padding:12px 16px;font-family:var(--serif-body);font-size:.9rem;cursor:pointer;
    border-bottom:1px solid var(--hair);
  }
  .trans-menu button:last-child{border-bottom:none;}
  .trans-menu button:hover{background:var(--bg);color:var(--ink);}
  .trans-menu button.active{color:var(--gold-bright);}
  .testbtns{display:flex;gap:8px;}
  .testbtns button{
    background:none;border:1px solid var(--hair);color:var(--ink-dim);
    padding:8px 14px;font-family:var(--serif-latin);font-size:.72rem;letter-spacing:.1em;cursor:pointer;
  }
  .testbtns button.active{border-color:var(--wine-bright);color:var(--gold-bright);background:rgba(92,20,24,.18);}

  .book-list{
    position:relative;z-index:2;max-width:1000px;margin:18px auto 0;padding:0 24px;
    display:flex;flex-wrap:wrap;gap:8px;
  }
  .book-list button{
    background:var(--bg-raised);border:1px solid var(--hair);color:var(--ink-dim);
    padding:7px 13px;font-size:.85rem;cursor:pointer;font-family:var(--serif-body);
  }
  .book-list button.active{border-color:var(--gold);color:var(--gold-bright);}
  .book-list button:disabled{opacity:.28;cursor:default;}

  .bible-selects{
    position:relative;z-index:2;max-width:1000px;margin:18px auto 0;padding:0 24px;
    display:flex;gap:12px;flex-wrap:wrap;
  }
  .bible-selects select{
    background:var(--bg-raised);border:1px solid var(--hair);color:var(--ink);
    padding:10px 14px;font-family:var(--serif-body);font-size:.95rem;
    cursor:pointer;min-width:220px;
    appearance:none;-webkit-appearance:none;
    background-image:linear-gradient(45deg, transparent 50%, var(--gold) 50%),linear-gradient(135deg, var(--gold) 50%, transparent 50%);
    background-position:calc(100% - 18px) center, calc(100% - 13px) center;
    background-size:5px 5px, 5px 5px;
    background-repeat:no-repeat;
  }
  .bible-selects select:focus{outline:none;border-color:var(--gold);}

  .chapter-wrap{
    position:relative;z-index:2;max-width:720px;margin:0 auto;padding:50px 28px 110px;
  }
  .chapter-wrap h2{
    font-family:var(--serif-display);font-weight:400;text-align:center;
    color:var(--gold-bright);font-size:1.9rem;margin-bottom:8px;
  }
  .chapter-wrap .chapter-sub{text-align:center;color:var(--ink-dim);font-size:.85rem;margin-bottom:44px;letter-spacing:.05em;}
  .verse{margin-bottom:14px;font-size:1.12rem;color:var(--ink);}
  .verse .vnum{color:var(--gold);font-size:.72rem;vertical-align:super;margin-right:5px;}
  .dropcap{
    float:left;font-family:var(--serif-display);font-size:4.6rem;line-height:.82;
    color:var(--gold-bright);padding:2px 10px 0 0;
    text-shadow:0 0 22px rgba(182,137,63,.35);
  }
  .chapter-wrap.rtl{direction:rtl;text-align:right;}
  .chapter-wrap.rtl .verse .vnum{margin-right:0;margin-left:5px;}
  .chapter-wrap.rtl .dropcap{float:right;padding:2px 0 0 10px;}
  .chapter-wrap.rtl h2, .chapter-wrap.rtl .chapter-sub{direction:ltr;}
  .missing-note{
    text-align:center;color:var(--ink-dim);font-size:.9rem;padding:40px 20px;
    border:1px dashed var(--hair);margin-top:20px;
  }

  /* ---------- misc ---------- */
  .intro-block{max-width:760px;margin:0 auto;padding:36px 24px 0;color:var(--ink-dim);font-size:.95rem;text-align:center;}

  @media(max-width:640px){
    .hero{padding:90px 20px 70px;}
    .qa-a-inner{padding-left:20px;}
  }
</style>
</head>
<body>
<div class="shell">

  <header class="top">
    <div class="top-inner">
      <div class="brand" onclick="go('home')"><span class="cross">☦</span> ΟΡΘΟΔΟΞΙΑ.ΑΠΟΛΟΓΙΑ</div>
      <nav class="mainnav" id="mainnav">
        <button data-r="home">Главная</button>
        <button data-r="bible">Библия</button>
        <button data-r="judaism">Вопросы от иудеев</button>
        <button data-r="islam">Вопросы от мусульман</button>
        <button data-r="atheism">Вопросы от атеистов</button>
        <button data-r="paganism">Вопросы от язычников</button>
        <button data-r="other">Прочее</button>
        <button data-r="refutations">Опровержение других религий</button>
      </nav>
    </div>
  </header>

  <main id="app"></main>

  <footer class="site-footer">
    <span class="fbrand">ΟΡΘΟΔΟΞΙΑ.ΑΠΟΛΟΓΙΑ</span>
    <span>© 2026</span> ·
    <span class="fverse">«И познаете истину, и истина сделает вас свободными.» — Евангелие от Иоанна, 8:32</span>
  </footer>

</div>

<script>
/* ============================================================
   CONTENT DATA
   ============================================================ */

const SECTIONS = {
  judaism: {
    latin: "CONTRA JUDAEOS",
    ru: "Вопросы со стороны иудеев",
    desc: "Ответы на вопросы, которые задают иудеи о мессианстве Иисуса Христа, толковании пророчеств и природе Бога.",
    items: [
      {
        q: "Есть ли в Ветхом Завете пророчества об Иисусе как о Мессии?",
        a: `
        <p>Да, и это один из центральных аргументов христианской апологетики со времён апостолов. Уже святой Иустин Философ во II веке в «Диалоге с Трифоном Иудеем» строил свою защиту веры именно на исполнившихся пророчествах, показывая, что личность и судьба Иисуса из Назарета совпадают с тем, что писали пророки за столетия до Его рождения — совпадение, которое невозможно объяснить случайностью или подгонкой задним числом, поскольку текст Септуагинты был переведён на греческий ещё в III–II веках до Р.Х., то есть до Христа.</p>
        <p><strong>Место рождения.</strong> Пророк Михей прямо называет город, в котором родится Владыка Израиля:</p>
        <div class="verse-block">«И ты, Вифлеем-Ефрафа, мал ли ты между тысячами Иудиными? из тебя произойдёт Мне Тот, Который должен быть Владыкою в Израиле, и Которого происхождение из начала, от дней вечных» (Михей 5:2).</div>
        <p>Здесь важно не только само указание на Вифлеем — небольшое селение, а не Иерусалим, — но и вторая часть стиха: «происхождение Его из начала, от дней вечных». Иудейский пророк говорит о правителе Израиля, чьё бытие простирается в вечность, — формулировка, которая выходит за пределы обычного человеческого происхождения и указывает на предвечное бытие Мессии, что христиане видят исполнившимся во Христе как Слове, Сущем «в начале у Бога» (Ин. 1:1–2).</p>
        <p><strong>Псалом 21 (по еврейской нумерации — 22) и распятие.</strong> Этот псалом Давида написан примерно за тысячу лет до изобретения римлянами казни через распятие (сама практика распятия как государственная казнь получила широкое распространение у персов, а затем у римлян значительно позже эпохи Давида), однако его образный ряд с поразительной точностью описывает именно эту казнь:</p>
        <div class="verse-block">«Пронзили руки мои и ноги мои... Делят ризы мои между собою, и об одежде моей бросают жребий» (Пс. 21:17–19).</div>
        <p>Ни побиение камнями (обычная казнь по Закону Моисееву), ни меч не предполагают пронзения именно рук и ног и разделения одежд по жребию — это специфические детали процедуры распятия: пригвождение конечностей и то, что палачи по обычаю делили личные вещи казнённого. Псалом также передаёт душевное состояние страдальца словами, которые Евангелия относят прямо к Христу на кресте: «Боже мой! Боже мой! для чего Ты оставил меня?» (Пс. 21:2) — это первый стих псалма, который Иисус произносит по-арамейски (Мф. 27:46), тем самым, по православному пониманию, указывая слушателям на весь псалом целиком, включая его пророческое содержание и последующий переход от скорби к торжеству воскресения в стихах 23–32.</p>
        <p><strong>Раб Господень у Исаии (гл. 53).</strong> Эта глава настолько подробно описывает страдающего и приносимого в жертву за грехи народа Праведника, что традиционная синагогальная экзегеза раннего периода (например, у некоторых таргумов и ранних раввинистических источников) также относила её к личности Мессии, прежде чем позднейшая полемика с христианством побудила часть иудейских толкователей переосмыслить образ как собирательный (Израиль). Христианское прочтение видит здесь описание невинного страдальца: «Он изъязвлен был за грехи наши и мучим за беззакония наши... и ранами Его мы исцелились» (Ис. 53:5).</p>
        <p>Совокупность этих и других пророчеств (Быт. 3:15 о семени жены; Быт. 49:10 о скипетре, не отходящем от Иуды до пришествия Примирителя; Дан. 9:24–27 о времени пришествия Помазанника; Зах. 9:9 о царе, входящем в Иерусалим на осле; Зах. 11:12–13 о тридцати сребрениках) образует, по слову православных богословов, целостную мозаику, узнаваемую только тогда, когда все фрагменты складываются в единый образ — образ Иисуса из Назарета.</p>`
      },
      {
        q: "Если Мессия уже пришёл, почему в мире до сих пор нет обещанного мира и Царства Божьего?",
        a:`<p>Иудейская традиция ожидает от Мессии немедленного и видимого преображения мира — прекращения войн, собирания рассеянного Израиля, восстановления Храма. Христианское богословие отвечает на это учением о двух пришествиях Мессии, которое само коренится в ветхозаветных текстах: пророки нередко сополагают образ страдающего, униженного Раба Господня (Ис. 53) с образом торжествующего Царя-Судии (Ис. 9:6–7; Дан. 7:13–14), не разделяя их во времени явно — и именно это создавало трудность для дохристианской экзегезы.</p>
        <p>Христианская Церковь, вслед за апостолами, увидела в этом не противоречие, а последовательность: первое пришествие — уничижённое, искупительное, совершённое «не в силе, а в немощи», второе — во славе, для окончательного суда и полного восстановления творения (ср. 2 Тим. 4:1; Откр. 19:11–16). Царство Божие, по слову Христа, уже «внутрь вас есть» (Лк. 17:21) — оно действует таинственно, через изменение сердец и через Церковь как Тело Христово, но его полное, космическое явление относится к концу времён.</p>
        <p>Это учение объясняет и то, почему зло и страдание продолжаются: Бог, по православному пониманию, не отменяет свободу человека принудительно, но действует через неё, и окончательное разрешение истории принадлежит будущему веку, а не первому явлению Мессии.</p>`
      },
      {
        q: "Разве вера в Троицу не противоречит заповеди «Господь Бог наш, Господь един есть» (Втор. 6:4)?",
        a:`<p>Это один из самых частых вопросов, и он основан на смешении единства сущности с единством числа как простого арифметического «один». Еврейское слово «эхад», использованное в Шма («Шема Исраэль... Адонай эхад»), само по себе не всегда означает абсолютную, неделимую монаду — оно нередко описывает составное единство. Классический пример — Бытие 2:24: «и будут (два человека) одна (эхад) плоть», где очевидно единство двух в одном. Другой пример — Числа 13:23, где кисть винограда, срезанная разведчиками, названа «эхад» — «одна», хотя состоит из множества ягод.</p>
        <p>Для абсолютно простого, неделимого единства в еврейском языке существует другое слово — «яхид», и характерно, что Писание НЕ использует его в формуле Шма. Это лингвистическое наблюдение не «доказывает» Троицу само по себе, но снимает возражение, будто монотеизм логически исключает внутреннюю полноту в единой Божественной сущности.</p>
        <p>Учение о Троице не есть учение о трёх богах (тритеизм), что было бы действительно нарушением монотеизма, а исповедание одного Бога, единого по существу (усии), но открывающегося в трёх Лицах (ипостасях) — Отце, Сыне и Святом Духе, — что, по слову святителя Григория Богослова, есть «единство в Троице и Троица в единстве». Уже Ветхий Завет содержит намёки на такую внутреннюю множественность в единстве: Бог говорит о Себе во множественном числе — «сотворим человека по образу Нашему» (Быт. 1:26), «вот, Адам стал как один из Нас» (Быт. 3:22), «сойдём же и смешаем там язык их» (Быт. 11:7); пророк Исаия видит явление, в котором Господь посылает Господа и Дух (Ис. 48:16); в явлении трёх мужей Аврааму у дуба Мамврийского (Быт. 18), которое сам текст называет явлением Господа (Быт. 18:1), православная традиция издревле видит прообраз Троицы — именно этот сюжет лёг в основу знаменитой иконы преподобного Андрея Рублёва «Троица».</p>
        <p>Итак, христианский монотеизм остаётся строгим монотеизмом: единый Бог по естеству, но не одинокий и не безличный, а полнота любви и общения внутри Самого Себя ещё прежде создания мира.</p>`
      },
      {
        q: "Почему христиане поклоняются человеку Иисусу как Богу — разве это не идолопоклонство?",
        a:`<p>Поклонение Иисусу как Богу было бы идолопоклонством лишь в том случае, если бы Иисус был просто человеком либо тварным существом. Христианское учение утверждает нечто иное: в Иисусе Христе Само вечное Слово Божие (Логос), единосущное Отцу, восприняло человеческую природу, не переставая быть Богом. Поэтому, поклоняясь Христу, христианин поклоняется не человеку как таковому, а воплощённому Богу.</p>
        <p>Само указание на возможность такого воплощения содержится уже в Ветхом Завете: пророк Исаия называет грядущего Младенца «Богом крепким, Отцом вечности» (Ис. 9:6); пророк Михей говорит о происхождении Владыки «от дней вечных» (Мих. 5:2); псалмопевец влагает в уста Бога слова, обращённые к Сыну: «Престол Твой, Боже, вовек» (Пс. 44:7 — этот стих цитирует апостол Павел в Евр. 1:8, прямо относя его к Христу). Таким образом, идея о Богоявлении в человеческом облике не чужда еврейскому Писанию, хотя её полное раскрытие принадлежит Новому Завету.</p>
        <p>Апостолы, будучи строгими монотеистами-иудеями, не видели противоречия в исповедании Иисуса Господом (греч. «Кириос» — то же слово, которым Септуагинта передаёт непроизносимое имя Божие ЙХВХ) именно потому, что отождествляли Его с Тем Самым Богом Израилевым, а не с отдельным божеством.</p>`
      },
      {
        q: "Почему христиане не соблюдают Закон Моисеев (субботу, кашрут, обрезание)?",
        a:`<p>Православное богословие видит в Ветхом Завете «детоводителя ко Христу» (Гал. 3:24) — педагогическую и прообразовательную систему, подготавливавшую народ Божий к принятию Мессии. С пришествием Христа обрядовый и гражданский элементы Закона (жертвоприношения, ритуальная чистота, гражданское законодательство Израиля) исполнились и получили новое, духовное содержание, тогда как нравственное ядро Закона (десять заповедей) осталось в полной силе и было даже углублено Христом в Нагорной проповеди («вы слышали, что сказано древним... а Я говорю вам...», Мф. 5).</p>
        <p>Сам пророк Иеремия предсказывал наступление нового завета, отличного от завета, заключённого при Синае: «вот, наступают дни, говорит Господь, когда Я заключу с домом Израиля и с домом Иуды новый завет... Я вложу закон Мой во внутренность их и на сердцах их напишу его» (Иер. 31:31–33). Христиане видят исполнение этого пророчества в Новом Завете, заключённом Кровью Христа, — потому апостолы на Иерусалимском соборе (Деян. 15) определили не возлагать на уверовавших из язычников бремя всего обрядового закона.</p>
        <p>Жертвоприношения животных в Храме, согласно посланию к Евреям, были лишь тенью и прообразом единой, совершенной и окончательной Жертвы Христа (Евр. 10:1–14) — потому с разрушением Храма в 70 году по Р.Х. сама возможность их совершения объективно прекратилась и для иудаизма, что православные апологеты рассматривают как исторический знак завершения ветхозаветного жертвенного строя.</p>`
      },
      {
        q: "Разве не кощунственно верить, что Бог мог умереть на кресте?",
        a:`<p>Православное богословие тщательно различает то, что происходит с Божеством, и то, что происходит с человечеством Христа, не разделяя при этом единого Лица (Ипостаси) Богочеловека. Умерла на кресте человеческая природа Христа — тело было разлучено с душой, как это бывает при всякой человеческой смерти, — тогда как Божество, будучи по природе бесстрастным и бессмертным, не могло претерпеть уничтожения. Однако, поскольку и человечество, и Божество соединены во единой Ипостаси Слова, Церковь исповедует, что пострадал и умер плотью «Один из Троицы» — это и есть смысл халкидонского догмата и знаменитой православной формулы Феопасхитского спора VI века: «Бог пострада плотию».</p>
        <p>Такое учение не унижает Бога, а, напротив, открывает глубину Его любви: Творец не остался в стороне от страдания творения, но добровольно разделил самую крайнюю его точку — смерть, — чтобы изнутри победить её Воскресением. Как говорит апостол Павел, «Он, будучи образом Божиим, не почитал хищением быть равным Богу; но уничижил Себя Самого, приняв образ раба... смирил Себя, быв послушным даже до смерти, и смерти крестной» (Флп. 2:6–8).</p>`
      },
      {
        q: "Как понимать пророчество о семидесяти седминах в книге Даниила (9:24–27)?",
        a:`<p>Пророк Даниил получает от архангела Гавриила точное хронологическое указание: от выхода повеления о восстановлении Иерусалима до пришествия «Христа Владыки» (евр. «Машиах нагид») пройдёт «семь седмин и шестьдесят две седмины» (Дан. 9:25) — то есть 69 «седмин» лет (483 года по традиционному пророческому летоисчислению). Большинство христианских толкователей отсчитывают начало этого периода от указа персидского царя Артаксеркса о восстановлении Иерусалима (сер. V в. до Р.Х., ср. Неем. 2) и получают дату, приходящуюся именно на время общественного служения Иисуса Христа в первой трети I века по Р.Х.</p>
        <p>Далее пророчество говорит, что «по истечении шестидесяти двух седмин предан будет смерти Христос, и не будет» (Дан. 9:26) — то есть Мессия не просто явится, но будет предан насильственной смерти прежде разрушения города и святилища, что, согласно пророчеству, последует «вслед за Ним» — событие, исполнившееся в 70 году по Р.Х., когда римляне под предводительством Тита разрушили Иерусалимский храм. Таким образом, пророчество Даниила указывает не просто на приблизительную эпоху, а на конкретную историческую последовательность: сначала насильственная смерть Мессии, затем — в течение того же поколения — разрушение Храма, что полностью соответствует смерти Христа около 30–33 годов по Р.Х. и последовавшему за этим в 70 году разрушению святилища, но исключает возможность отнесения этого пророчества к какому-либо более позднему кандидату в Мессии, поскольку Храма, о разрушении которого говорит пророчество, более не существует, а значит, ветхозаветное жертвенное служение, требуемое Законом, объективно невозможно исполнить.</p>`
      },
      {
        q: "Почему обрезание сердца, а не только обрезание плоти, является истинной праведностью?",
        a:`<p>Само это учение — не изобретение христианства, а прямое ветхозаветное пророческое требование. Ещё Моисей заповедал Израилю: «Итак обрежьте крайнюю плоть сердца вашего и не будьте более жестоковыйны» (Втор. 10:16), а в другом месте обещал: «И обрежет Господь Бог твой сердце твоё и сердце потомства твоего, чтобы ты любил Господа Бога твоего от всего сердца твоего» (Втор. 30:6). Пророк Иеремия повторяет тот же призыв: «Обрежьте себя для Господа, и снимите крайнюю плоть с сердца вашего» (Иер. 4:4).</p>
        <p>Апостол Павел, будучи фарисеем и знатоком Писания, опирается именно на эту пророческую традицию, а не изобретает что-то новое, когда пишет: «Обрезание сердца, по духу, а не по букве: ему и похвала не от людей, но от Бога» (Рим. 2:29). Физическое обрезание в Ветхом Завете само было знаком (Быт. 17:11) — внешним указанием на требуемую внутреннюю реальность верности и посвящённости Богу; христианство утверждает, что с пришествием Христа внешний знак исполнился в том, на что он указывал изначально, и потому более не требуется как условие принадлежности к народу Божию (ср. Гал. 5:6: «во Христе Иисусе не имеет силы ни обрезание, ни необрезание, но вера, действующая любовью»).</p>`
      },
      {
        q: "Разве не кощунственно называть Иисуса «Господом» (Кириос), используя титул, которым в Септуагинте передаётся имя Божие?",
        a:`<p>Действительно, в дохристианском греческом переводе Ветхого Завета — Септуагинте, выполненной иудейскими переводчиками ещё за два-три столетия до Христа, — непроизносимое священное имя Божие (тетраграмматон ЙХВХ) регулярно передаётся греческим словом «Кириос» («Господь»). Именно поэтому то обстоятельство, что новозаветные авторы — все они, за редким исключением, этнические иудеи, воспитанные в строжайшем монотеизме, — прилагают тот же самый титул «Кириос» ко Христу, причём совершенно не смущаясь и не считая это кощунством, само по себе является значимым историческим свидетельством того, как ранняя, ещё полностью иудейская Церковь понимала личность Иисуса.</p>
        <p>Показательный пример — апостол Павел в Послании к Филиппийцам прилагает ко Христу пророчество Исаии, изначально сказанное о Себе Самим Господом Богом: «предо Мною преклонится всякое колено, и Мною будет клясться всякий язык» (Ис. 45:23) — Павел пишет: «дабы пред именем Иисуса преклонилось всякое колено... и всякий язык исповедал, что Господь Иисус Христос в славу Бога Отца» (Флп. 2:10–11). Отнесение ветхозаветного пророчества, буквально говорящего о Самом ЙХВХ, к Иисусу — это не случайная обмолвка одного автора, а последовательный образец применения ветхозаветных текстов о Господе Боге к личности Христа, встречающийся у различных новозаветных авторов независимо друг от друга (ср. также Евр. 1:10, где ко Христу прилагается Пс. 101:26–28, обращённый в псалме к Самому Господу).</p>`
      },
      {
        q: "Что означают слова пророка Захарии: «И они воззрят на Меня, Которого пронзили» (Зах. 12:10)?",
        a:`<p>В этом пророчестве Сам Господь говорит от первого лица: «И воззрят на Меня, Которого они пронзили, и будут рыдать о Нём, как рыдают об единородном сыне, и скорбеть, как скорбят о первенце» (Зах. 12:10). Особая сложность и особая сила этого текста в том, что говорящий — Сам Господь (ЙХВХ), но при этом Он говорит о Себе как о Том, Кто был «пронзён» самим домом Давидовым и жителями Иерусалима, — то есть пророчество прямо связывает страдание, причинённое Самому Господу, с покаянным плачем всего народа, который впоследствии обратится и признает содеянное.</p>
        <p>Христианское прочтение видит в этом пророчестве прямое указание на распятие Христа, при котором, согласно свидетельству евангелиста Иоанна, один из воинов «копьём пронзил Ему рёбра» (Ин. 19:34) — Иоанн прямо и сознательно цитирует именно это пророчество Захарии в следующем стихе (Ин. 19:37: «и опять в другом месте Писание говорит: воззрят на Того, Которого пронзили»), указывая тем самым читателям на его пророческое исполнение. Совмещение в одном пророческом тексте образа Господа, Которого пронзают, и образа будущего покаянного обращения народа к Нему богословски согласуется именно с христианским учением о Богочеловеке, добровольно принявшем на Себя страдание ради последующего покаяния и спасения тех самых людей, которые в нём участвовали.</p>`
      }
    ]
  },

  islam: {
    latin: "CONTRA ISLAMUM",
    ru: "Вопросы со стороны мусульман",
    desc: "Ответы на вопросы о распятии Христа, природе Троицы, подлинности Писания и пророческом достоинстве Мухаммеда.",
    items: [
      {
        q: "Почему утверждение Корана, что Иисус не был распят (сура 4:157), является ложным?",
        a:`<p>Коран, составленный, по мусульманской традиции, в VII веке по Р.Х., то есть спустя более шестисот лет после событий, утверждает: «...они не убили его и не распяли, но это только представилось им» (сура 4:157). Это утверждение противоречит всей совокупности исторических и текстологических данных.</p>
        <p><strong>Свидетельства нехристианских источников I–II веков.</strong> Римский историк Тацит, писавший около 116 года и настроенный к христианам крайне враждебно, сообщает, что «Христос, от имени которого происходит это название, был предан смертной казни прокуратором Понтием Пилатом в правление Тиберия» (Анналы, XV.44). Иудейский историк Иосиф Флавий (конец I века) в так называемом Testimonium Flavianum, даже с учётом возможных позднейших христианских вставок, в своей основе признаваемых большинством современных исследователей подлинными, также фиксирует казнь Иисуса по приговору Пилата. Талмуд (трактат Санхедрин 43а) содержит враждебное христианству упоминание о повешении Иешу «в канун Пасхи» — само по себе косвенное подтверждение казни из иудейской, а не христианской среды.</p>
        <p><strong>Хронологический разрыв источников.</strong> Евангелия и послания апостола Павла — включая 1-е Послание к Коринфянам (гл. 15), которое большинство светских историков-библеистов, независимо от их отношения к христианству, датируют серединой I века, то есть менее чем двадцатью годами после события, — были написаны очевидцами или на основании свидетельств очевидцев. Коранический текст возник спустя шесть столетий, в совершенно иной географической и культурной среде, и не опирается на независимую историческую традицию об этом событии, а, по наблюдению исследователей истории религий, ближе всего к отголоскам докетических и гностических представлений II–III веков (в частности, идей, близких к так называемому «Евангелию Василида»), согласно которым на кресте вместо Христа пострадал кто-то другой.</p>
        <p><strong>Внутренняя логика события.</strong> Публичная казнь, совершённая по приговору римского наместника в столице провинции в дни, когда город был переполнен паломниками на Пасху, оставила бы след в исторической памяти современников независимо от их отношения к личности Христа — что и произошло, судя по нехристианским свидетельствам. Версия о «замене» или «видимости» распятия не имеет опоры ни в одном источнике I века и появляется впервые в гностической и, позднее, коранической литературе, отражая скорее богословские предпосылки этих традиций (в частности, представление о том, что Пророку не подобает претерпеть позорную смерть), нежели историческую реконструкцию.</p>
        <p>Отрицание распятия подрывает и саму суть Евангелия: без Креста нет искупления, а без Воскресения, по слову апостола Павла, «вера ваша тщетна» (1 Кор. 15:17) — но именно поэтому вопрос о распятии остаётся центральным пунктом расхождения между христианством и исламом, а не второстепенной деталью.</p>`
      },
      {
        q: "Почему Троица — это истинное единобожие, а не то, что мусульмане называют ширком (многобожием)?",
        a:`<p>Ислам отождествляет всякое утверждение о множественности в Боге со ширком — приданием Аллаху сотоварищей. Однако христианское учение о Троице никогда не утверждало трёх богов или бога с «сотоварищами»: оно исповедует Одного Бога, единого по существу (сущности), познаваемого в трёх Лицах — Отце, Сыне и Святом Духе, — не как три отдельных существа, объединённых внешне, а как одну неделимую природу, вечно пребывающую в общении трёх Ипостасей.</p>
        <p>Различие между «числом сущностей» и «числом Лиц» принципиально: единобожие (монотеизм в строгом смысле) утверждает, что есть только одна Божественная сущность — и здесь христианство совершенно бескомпромиссно, называя тритеизм (веру в трёх богов) такой же ересью, какой его считает ислам. Но христианство не согласно с тем, что единство сущности обязательно требует и единства Лица — то есть с философской предпосылкой, которая сама по себе не выводится напрямую ни из разума, ни из большинства ветхозаветных текстов, где, как отмечалось выше (см. раздел «Вопросы от иудеев»), встречаются указания на внутреннюю множественность в единстве Бога (Быт. 1:26; 18:1–3; Ис. 48:16).</p>
        <p>Более того, сам Коран, отвергая христианскую Троицу, в суре 5:73–75 и 5:116 описывает её ошибочно — как триаду «Аллах, Иисус и Мария», что не соответствует ни одному христианскому вероучительному тексту ни одной эпохи и ни одной конфессии. Ни Никейский (325 г.), ни Константинопольский (381 г.) Символы веры, сформулированные за два-три столетия до Корана, не содержат ничего подобного. Это наблюдение, отмечаемое многими исследователями истории религий, указывает на то, что коранический текст полемизирует не с подлинным христианским догматом о Троице, а с искажённым его пересказом, вероятно, восходящим к маргинальным сектам (например, к «коллиридианам», почитавшим Марию как богиню), встречавшимся в Аравии VII века, но осуждённым самой Церковью ещё до появления ислама.</p>`
      },
      {
        q: "Разве текст Библии не был искажён (тахриф) до и после Мухаммеда?",
        a:`<p>Утверждение о тахрифе (порче текста) сталкивается с серьёзной текстологической трудностью: рукописи Ветхого Завета (например, свитки Мёртвого моря, найденные в Кумране и датируемые II веком до Р.Х. — I веком по Р.Х., то есть за столетия до ислама) и рукописи Нового Завета (папирусы II–III веков, такие как Папирус Бодмера и фрагмент P52) в существенных чертах совпадают с текстом, который используется в христианских Библиях сегодня. Если бы «порча» произошла после Мухаммеда, она должна была бы затронуть тысячи рукописей, разбросанных по всему христианскому миру — от Эфиопии до Британии, от Армении до Испании, — и при этом не оставить никаких текстологических следов разночтения, что практически невозможно с точки зрения источниковедения.</p>
        <p>Если же имеется в виду порча текста до Мухаммеда, то встаёт другой вопрос: сам Коран неоднократно называет Тору и Евангелие, существовавшие в VII веке, «светом и руководством» (сура 5:44) и призывает «людей Писания» судить по тому, что́ ниспослал в них Аллах (сура 5:47), не сообщая при этом, что данный текст уже был искажён, — что было бы логически необходимо, если бы порча уже произошла к тому времени.</p>
        <p>Библейская текстология, как христианская, так и светская, признаёт наличие мелких разночтений между отдельными рукописями (описки переписчиков, порядок слов и т. п.) — это нормальное явление для любого рукописного текста древности, — но эти разночтения не затрагивают ни одного основного вероучительного положения и хорошо документированы в научном аппарате современных критических изданий, что само по себе свидетельствует не о сокрытии, а о прозрачности текстологической традиции.</p>`
      },
      {
        q: "Разве в Евангелии от Иоанна не предсказано пришествие Мухаммеда под именем Утешителя (Параклета)?",
        a:`<p>Некоторые мусульманские апологеты отождествляют обещанного Христом «Утешителя» (греч. «Параклитос», Ин. 14:16, 26; 15:26; 16:7) с Мухаммедом, порой ссылаясь на предполагаемое смешение с греческим словом «Периклитос» («славный», близким по значению к имени «Ахмад»). Однако сам евангельский текст исключает такое толкование по нескольким причинам.</p>
        <p>Во-первых, Христос прямо называет Утешителя «Духом Святым» (Ин. 14:26: «Утешитель же, Дух Святый, Которого пошлёт Отец во имя Мое») — личность, а не человека, рождённого спустя шесть веков. Во-вторых, Утешитель, по словам Христа, посылается тотчас после Его отшествия («когда же приидет Утешитель... Он будет свидетельствовать о Мне», Ин. 15:26) и, согласно книге Деяний апостолов, действительно сходит на апостолов уже в день Пятидесятницы (Деян. 2) — событие, отделённое от земной жизни Христа считанными днями, а не столетиями. В-третьих, задача Утешителя, по слову Христа, — «научить вас всему и напомнить вам всё, что Я говорил вам» (Ин. 14:26), то есть подтвердить, а не заменить или отменить учение Христа, тогда как Коран во многих пунктах прямо расходится с христологией Евангелий (в частности, в вопросе о распятии и Богосыновстве Христа).</p>
        <p>Наконец, что касается филологической гипотезы о смешении «Параклитос» / «Периклитос»: она не подтверждается ни одной ранней рукописью Евангелия от Иоанна — все известные греческие манускрипты, включая самые ранние, содержат именно «Параклитос», а сама гипотеза возникает в мусульманской полемике значительно позднее и не имеет опоры в текстологии.</p>`
      },
      {
        q: "Почему христиане не признают Коран последним и окончательным откровением Бога?",
        a:`<p>Христианское богословие исходит из того, что окончательное и полное откровение Бога о Себе уже дано в Иисусе Христе, Который есть, по слову Послания к Евреям, «сияние славы и образ ипостаси Его» (Евр. 1:3), — Слово Божие, ставшее плотью (Ин. 1:14). Поэтому любое позднейшее «откровение», предлагающее иной, несовместимый образ Бога и иную оценку личности и миссии Христа (в частности, отрицающее Его Богосыновство, крестную смерть и телесное Воскресение — центральные события христианской веры, засвидетельствованные, как показано выше, множеством ранних и независимых источников), с христианской точки зрения не может быть признано подлинным продолжением того же самого откровения, но представляет собой иную, несовместимую с ним систему.</p>
        <p>Апостол Павел ещё в середине I века, задолго до появления ислама, предупреждал: «Но если бы даже мы или Ангел с неба стал благовествовать вам не то, что мы благовествовали вам, да будет анафема» (Гал. 1:8) — эти слова, по православному пониманию, применимы к любому позднейшему учению, включая позднейшие, которое существенно меняло бы содержание евангельской проповеди о Христе распятом и воскресшем.</p>`
      },
      {
        q: "Чем образ Иисуса в Коране отличается от Иисуса Евангелий?",
        a:`<p>Коранический Иса ибн Марьям (Иисус, сын Марии) — почитаемый пророк, рождённый от девы чудесным образом (сура 19), совершающий чудеса с дозволения Аллаха, но остающийся сотворённым человеком, не распятый и не воскресший, предсказывающий приход «Ахмада» (сура 61:6) и в конце времён возвращающийся как эсхатологическая фигура, подчинённая исламскому вероучению. Иисус Евангелий — предвечное Слово Божие, ставшее плотью, единородный Сын Отца, Который умирает на кресте за грехи мира и воскресает в третий день, свидетельствуя тем самым о победе над смертью, и Которого апостолы называют «Господом и Богом» (Ин. 20:28, слова апостола Фомы, прямо обращённые к воскресшему Христу и не встретившие возражения с Его стороны).</p>
        <p>Эти два образа несовместимы не в частностях, а в самой сути: один текст утверждает, что Иисус не Бог и не был распят, другой — что Он и есть воплощённый Бог, добровольно принявший крестную смерть. Признать оба образа одновременно истинными логически невозможно, поэтому вопрос сводится к тому, какой из источников — ранние и множественные независимые свидетельства I века или коранический текст VII века — заслуживает большего исторического доверия относительно событий, произошедших в Иудее в первой трети I столетия.</p>`
      },
      {
        q: "Почему христиане не принимают описание рая в Коране (телесные наслаждения, гурии) как истинное представление о вечной жизни?",
        a:`<p>Коран описывает рай преимущественно в образах телесного, чувственного наслаждения: сады с реками из воды, молока, вина и мёда (сура 47:15), возлежание на ложах, плоды, мясо птиц, чаши с вином, «черноокие, большеглазые» девы-гурии (сура 56:12–23, 37:48–49) — то есть продолжение и умножение земных удовольствий, включая телесно-чувственные, в некотором усиленном и вечном виде.</p>
        <p>Христианское понимание вечной жизни принципиально иное по своей направленности: цель не в умножении телесных удовольствий, а в непосредственном богообщении — «блаженны чистые сердцем, ибо они Бога узрят» (Мф. 5:8), «увидим Его, как Он есть» (1 Ин. 3:2). Сам Христос прямо говорит, что в воскресении «ни женятся, ни выходят замуж, но пребывают, как Ангелы Божии на небесах» (Мф. 22:30) — то есть прямо исключает продолжение земных плотских отношений как содержание будущего века. Апостол Павел говорит о том, что «не видел того глаз, не слышало ухо, и не приходило то на сердце человеку, что приготовил Бог любящим Его» (1 Кор. 2:9) — то есть блаженство будущего века превосходит категории земного, телесного удовольствия, а не является его продолжением и умножением. Различие здесь не в деталях, а в самой природе понимания того, в чём заключается высшее благо человека: в единении с Богом Личностью к Личности, или в удовлетворении, пусть даже вечном и совершенном, чувственных желаний.</p>`
      },
      {
        q: "Разве Мухаммед не превосходит Иисуса — ведь он одержал военные победы и основал могущественное государство, тогда как Христос был казнён как преступник?",
        a:`<p>Это возражение исходит из предпосылки, что мерилом истинности пророческой миссии является земной, военный и политический успех — предпосылки, которую христианство сознательно и принципиально отвергает. Сам Христос отказался от пути земной, военной власти, когда, по свидетельству Евангелия, народ хотел «нечаянно взять Его и сделать царём», Он «опять удалился на гору один» (Ин. 6:15), а на вопрос Пилата о Царстве ответил: «Царство Моё не от мира сего; если бы от мира сего было Царство Моё, то служители Мои подвизались бы за Меня, чтобы Я не был предан Иудеям; но ныне Царство Моё не отсюда» (Ин. 18:36).</p>
        <p>Более того, ветхозаветное пророчество о Мессии как о «Муже скорбей», Который будет «презрен и умален пред людьми» (Ис. 53:3), заранее исключает военно-политический триумф как признак подлинности мессианской миссии первого пришествия — уничижение и добровольное принятие несправедливой смерти здесь не случайная неудача, а сама суть искупительного подвига: Христос «уничижил Себя Самого... смирил Себя, быв послушным даже до смерти, и смерти крестной» (Флп. 2:7–8), и именно поэтому, по слову того же апостола, «Бог превознёс Его» (Флп. 2:9). Христианская этика, в отличие от практики ранних завоевательных походов, распространявшихся вместе с исламом, принципиально отделяет распространение веры от военной силы — Христос учит любить врагов (Мф. 5:44) и Сам, имея, по Его собственным словам, возможность призвать «более, нежели двенадцать легионов Ангелов» (Мф. 26:53), не воспользовался ею для собственной защиты.</p>`
      },
      {
        q: "Как объяснить текстологические расхождения между ранними списками Корана (например, санааские палимпсесты) и современным печатным текстом?",
        a:`<p>Найденные в 1972 году в Сане (Йемен) коранические палимпсесты — рукописи, где более ранний текст был счищен и поверх него написан новый, — оказались, по данным радиоуглеродного анализа, датируемыми возможно уже второй половиной VII века, то есть чрезвычайно рано по меркам истории коранического текста. Исследование нижнего, счищенного слоя текста (проведённое, в частности, немецким исследователем Герд-Р. Пуин) выявило многочисленные расхождения с текстом стандартного современного Корана (редакции халифа Усмана): иной порядок сур, иные орфографические варианты, а в отдельных случаях — иные формулировки стихов.</p>
        <p>Это открытие представляет для мусульманской традиции трудность, симметричную той, которую ислам пытается приписать христианскому Писанию: если сама традиция настаивает на том, что текст Корана был передан в неизменном виде от продиктованного Мухаммедом оригинала, то существование более ранней рукописной версии, отличающейся от позднейшего стандартизированного текста, ставит вопрос о характере и масштабе редакторской работы, проведённой при канонизации текста халифом Усманом (который, согласно самой исламской традиции, распорядился уничтожить все альтернативные списки Корана, что само по себе указывает на существование значимых текстовых разночтений на раннем этапе). Это наблюдение не отменяет ценности Корана как исторического и религиозного памятника, но подрывает специфически полемический аргумент о его «абсолютной, засвидетельствованной документально неизменности» в противовес якобы «искажённому» тексту Библии, притом что рукописная традиция Нового Завета документирована несравнимо шире и на значительно более раннем материале.</p>`
      },
      {
        q: "Разве утверждение, что у Аллаха «нет сына» (сура 112:3), не опровергает христианское учение о Богосыновстве Христа?",
        a:`<p>Сура «Аль-Ихлас» гласит: «Он — Аллах — Един, Аллах, Самодостаточный; Он не родил и не был рождён» (сура 112:1–3). Однако это возражение исходит из представления о «сыновстве» в исключительно телесном, физическом смысле — как о порождении через размножение, требующем супруги (действительно, Коран в другом месте риторически спрашивает: «Как может быть у Него сын, если у Него нет подруги?», сура 6:101) — то есть коранический текст полемизирует с представлением, будто Бог физически, телесно родил Сына, подобно человеческому деторождению, — представлением, которое сама христианская традиция также категорически отвергает как ересь.</p>
        <p>Христианское богословие говорит о «предвечном рождении» Сына от Отца не в физическом, телесном смысле, а как о вечном, вневременном отношении внутри неизменной Божественной природы — так же, как свет вечно происходит от источника света, не будучи при этом «моложе» его и не предполагая никакого временного или материального акта порождения. Никейский Символ веры (325 г.), сформулированный за три века до Корана, прямо утверждает: Сын «рождён, не сотворён, единосущен Отцу» — то есть между «рождением» в богословском смысле и «сотворением» проводится принципиальное различие, а сама формула заранее исключает то понимание физического порождения, против которого на самом деле направлена коранична полемика. Итак, коранический текст справедливо отвергает языческое или буквально-телесное представление о Божественном «сыне», но не затрагивает того богословски точного смысла, в котором Церковь исповедует предвечное рождение Слова.</p>`
      },
      {
        q: "Почему христиане почитают иконы — разве это не идолопоклонство?",
        a:`<p>Ислам, следуя строгому запрету на изображение живых существ в культовом контексте и учению о ширке (придании Аллаху сотоварищей), рассматривает любое поклонение образу как форму идолопоклонства. Однако православное богословие проводит принципиальное различие, которое снимает это возражение при внимательном рассмотрении, — различие между «поклонением» (греч. «латрия»), воздаваемым исключительно Богу, и «почитанием» (греч. «дулия»), воздаваемым иконе не как самостоятельному предмету, обладающему собственной божественной силой, а как образу, через который ум молящегося восходит к первообразу — ко Христу, Богородице или святому, на ней изображённому.</p>
        <p>Это учение было соборно сформулировано VII Вселенским Собором в 787 году именно в ответ на обвинения в идолопоклонстве (со стороны иконоборцев внутри самой Церкви, отчасти под влиянием исламской и иудейской полемики того времени): «честь, воздаваемая образу, восходит к первообразу, и поклоняющийся иконе поклоняется ипостаси изображённого на ней». Икона в православном понимании — это не идол в смысле языческого истукана, которому приписывается собственная, обитающая в самом веществе сила (как это было, например, в древних культах, где статую «оживляли» особыми обрядами), а свидетельство о том, что Бог Сам стал видимым человеком во Христе: «Слово стало плотию и обитало с нами» (Ин. 1:14) — именно реальность Боговоплощения, по учению защитников икон (прежде всего преподобного Иоанна Дамаскина), сделала возможным и оправданным изображение Невидимого Бога в Его видимой человеческой природе, тогда как до пришествия Христа, в ветхозаветную эпоху, действительно действовал прямой запрет на изображение Божества (Исх. 20:4) — именно потому, что Бог тогда ещё не явил Себя видимым образом.</p>
        <p>Стоит также заметить, что сама исламская традиция не свободна от почитания материальных предметов через физический контакт с ними: паломники при совершении хаджа целуют Чёрный камень, вмонтированный в стену Каабы (обычай, восходящий, по историческим данным, ещё к доисламской Аравии), и совершают ритуальный обход (таваф) вокруг самого здания Каабы. Упоминание об этом — не попытка обвинить ислам в идолопоклонстве в ответ, а указание на то, что почитание освящённого места или предмета как знака, направляющего благоговение к Богу, а не как самостоятельного объекта поклонения, — явление, знакомое разным религиозным традициям, и потому обвинение в «идолопоклонстве» требует, как в случае с иконами, различения между самим предметом и тем, к Кому в действительности обращено благоговение через него.</p>`
      }
    ]
  },

        q: "Разве вера в чудеса (например, в Воскресение) не противоречит законам природы, изучаемым наукой?",
        a:`<p>Законы природы, открываемые наукой, описывают то, как устроен и как обычно действует сотворённый мир при отсутствии вмешательства извне — это статистически устойчивые закономерности, а не метафизические ограничения, накладывающие запрет на возможные действия Самого Творца этих законов. Философ Дэвид Юм в XVIII веке настаивал, что чудо, по определению, есть настолько маловероятное событие, что свидетельство о нём никогда не может перевесить свидетельство в пользу закона природы, — однако это рассуждение по существу является образцом кругового рассуждения (petitio principii): оно заранее, ещё до рассмотрения конкретных исторических свидетельств, постулирует, что законы природы не могут иметь исключений, то есть заранее исключает саму возможность чуда определением, а не анализом фактов.</p>
        <p>Христианское богословие не утверждает, что чудеса — это «нарушение» законов природы в смысле хаотического разрушения порядка, а рассматривает их как свободное действие Того же Самого Бога, Который установил этот порядок и не связан им как чем-то внешним по отношению к Себе — так же, как автор произведения не «нарушает» законов созданного им мира, вводя в него необычное событие, поскольку сам этот мир целиком зависит от его творческой воли. Что касается конкретно Воскресения Христа — этот вопрос как раз является тем случаем, когда историческое свидетельство (в частности, раннее и множественное свидетельство очевидцев, зафиксированное апостолом Павлом уже в 50-х годах I века в 1 Кор. 15:3–8) заслуживает серьёзного разбора по существу, а не автоматического отклонения на основании философской предпосылки о невозможности чудес в принципе.</p>`
      },
      {
        q: "Если в мире существует так много религий, не доказывает ли это, что все они — просто человеческие выдумки?",
        a:`<p>Многообразие религиозных традиций само по себе логически не доказывает ложности всех их без исключения — это классическая логическая ошибка (называемая иногда «аргументом от разнообразия мнений»): из того, что по какому-то вопросу существует множество несовпадающих позиций, вовсе не следует, что верной не может быть ни одна из них. В любой другой области знания — в философии, в науке на её переднем крае, в этике — существует множество несовпадающих теорий, но это не заставляет нас заключить, что истины по этим вопросам вообще не существует.</p>
        <p>Более того, многообразие религий само по себе является определённым нейтральным фактом, требующим объяснения при любой мировоззренческой позиции — атеизм должен объяснить, почему религиозное чувство и стремление к трансцендентному оказалось настолько универсальным и устойчивым феноменом человеческой культуры во всех известных цивилизациях, а не только в одной случайной. Христианское богословие, со своей стороны, объясняет это многообразие как искажённое, но не полностью утраченное стремление человека, сотворённого «по образу Божию», к своему Творцу — стремление, которое лишь в полноте и без искажений было явлено в откровении Иисуса Христа (ср. слова апостола Павла афинянам о «Боге неведомом», Деян. 17:23, разобранные подробнее в разделе «Вопросы от язычников»).</p>`
      },
      {
        q: "Если Бог всеведущ и заранее знает все будущие события, есть ли у человека подлинная свобода воли?",
        a:`<p>Это классическая философско-богословская проблема (совместимость Божественного предведения и человеческой свободы), которую подробно рассматривали ещё блаженный Августин и особенно Боэций в трактате «Утешение философией» (VI век). Ключевое решение, принятое большей частью православной и западной святоотеческой традиции, состоит в различении предведения (простого знания о том, что произойдёт) и предопределения (причинного установления того, что должно произойти) — Бог, пребывая, в отличие от человека, вне времени (то есть не «до» события во временном смысле, а в вечности, объемлющей всю временную последовательность разом), видит все свободные решения человека — прошлые, настоящие и будущие для нас — одновременно и непосредственно, подобно тому как наблюдатель, стоящий над дорогой, видит сразу всех идущих по ней путников, не принуждая при этом ни одного из них к выбору направления.</p>
        <p>Простое знание о будущем свободном действии логически не тождественно принуждению к этому действию: то, что я точно знаю, что мой друг завтра свободно выберет чай, а не кофе (например, зная его характер в совершенстве), не означает, что я тем самым лишаю его свободы выбора в момент самого выбора. Аналогично Божественное всеведение, согласно этому классическому решению, не отменяет подлинности человеческой свободы, а лишь означает, что Бог, находясь вне временной последовательности, безошибочно знает, как именно эта свобода будет реализована.</p>`
      },
      {
        q: "Разве бритва Оккама не требует объяснять происхождение Вселенной без гипотезы о Боге, раз это более простое объяснение?",
        a:`<p>Принцип «бритвы Оккама» (не следует умножать сущности сверх необходимости) требует не безусловного предпочтения количественно наименьшего числа причин, а предпочтения наиболее простого объяснения, которое всё же адекватно и полностью объясняет все относящиеся к делу факты, — и здесь ключевое слово «адекватно»: бритва Оккама не оправдывает выбор объяснения, которое проще, но не в состоянии объяснить сам факт, требующий объяснения.</p>
        <p>Применительно к происхождению Вселенной: постулат о безличной, ненаправленной физической причине сталкивается с трудностью объяснить, почему вообще существует нечто, а не абсолютное ничто (поскольку сама физика, как наука, изучающая законы, действующие внутри уже существующей физической реальности, по определению не может объяснить происхождение самого физического бытия как такового — это вопрос иного, метафизического порядка, выходящий за пределы компетенции физики). Гипотеза о трансцендентной, личностной, вневременной Первопричине — как показано в ответе на вопрос о доказательствах бытия Божия — как раз и предлагается философской традицией именно потому, что она, а не постулат о «Вселенной без причины» или о «бесконечной цепи причин», предлагает содержательный, а не просто более экономный по числу элементов, ответ на вопрос о конечном происхождении бытия. Простота объяснения без объяснительной силы — не добродетель, а недостаток, который бритва Оккама как раз и призвана отсекать.</p>`
      }
    ]
  },

    items: [

        q: "Чем монотеизм принципиально отличается от многобожия и почему он предпочтительнее с точки зрения христианства?",
        a:`<p>Языческое многобожие исторически представляло божественное как множество ограниченных, частных сил природы или судьбы — бог войны, бог моря, богиня плодородия, — каждая из которых обладает своей сферой власти, своими слабостями и нередко враждует или соперничает с другими божествами, как это видно из мифологий Греции, Рима, скандинавских и славянских народов. Такая картина мира делает саму божественность частью более широкого космоса, подчинённой судьбе (мойре, року) как высшей, безличной силе, стоящей даже над богами.</p>
        <p>Библейский монотеизм утверждает нечто принципиально иное: Бог — не часть мира и не подчинён высшей судьбе, а Творец всего сущего «из ничего» (2 Мак. 7:28), абсолютно свободный, всемогущий и всеблагой, источник самого бытия, а не одна из действующих в нём сил. Это меняет саму структуру реальности: мир перестаёт быть ареной борьбы соперничающих сил и осмысляется как творение единого разумного Промысла, что, среди прочего, стало философской предпосылкой для представления о единых, universal законах природы, познаваемых разумом, — представления, на которое опирается и современная наука.</p>

        <p>Во-вторых, сюжеты об Осирисе или Дионисе структурно отличаются от евангельского повествования: это, как правило, циклические мифы о вечном природном цикле (умирание и возрождение растительности, смена времён года), не привязанные к конкретному историческому времени и месту, тогда как Евангелия настаивают на конкретных, проверяемых исторических деталях — правление императора Тиберия, прокураторство Понтия Пилата, первосвященство Каиафы (Лк. 3:1), — что характерно именно для исторического, а не мифологического повествования, и что позволяло современникам (враждебным, как Тацит) проверять и оспаривать эти события, если бы они были вымышлены.</p>

        a:`<p>Православное богословие проводит принципиальное различие между «поклонением» (греч. «латрия»), которое воздаётся исключительно Богу как Творцу, и «почитанием» (греч. «дулия», а применительно к Богородице — «гипердулия»), которое воздаётся святым как друзьям Божиим, прославленным Его благодатью, но не как самостоятельным источникам божественной силы. Икона в православном понимании — это не изображение, которому поклоняются как самостоятельному божеству (что было бы действительно языческим идолопоклонством), а «окно», через которое молящийся обращает своё почитание к самому первообразу — к святому или ко Христу, изображённому на ней; это учение было соборно закреплено VII Вселенским Собором в 787 году, который прямо сформулировал: «честь, воздаваемая образу, восходит к первообразу».</p>
        <p>Это отличается от языческого идолопоклонства в самой сути: языческий идол в древнем мире часто мыслился как вместилище или как само тело божества (отсюда обряды «оживления» статуй в египетской и месопотамской практике), тогда как икона — лишь символическое изображение, не наделяемое самостоятельной божественной природой. Именно поэтому иконоборческий период VIII–IX веков в Византии закончился торжеством иконопочитания как учения, совместимого с строгим монотеизмом, а не как его нарушением.</p>`

        a:`<p>Историческая связь между датой 25 декабря и римским праздником Sol Invictus действительно обсуждается исследователями, однако сама причинно-следственная связь не столь однозначна, как иногда представляется: существует и альтернативная, документированная уже у некоторых раннехристианских авторов (например, у Тертуллиана и в анонимном трактате «De Pascha Computus», III век) хронологическая традиция, связывавшая дату Рождества с вычислениями, отталкивающимися от предполагаемой даты Благовещения и, соответственно, зачатия Христа, независимо от солнечного культа.</p>

        a:`<p>Ряд коранических формулировок о природе мира вызывает серьёзные вопросы при их буквальном прочтении. Земля описывается как «расстеленная» (сура 15:19, глагол «мадда» — «растянул», «расстелил», как ковёр); солнце, согласно 18:86, заходит «в мутный источник»; в 54:1 говорится о «расколовшейся луне». Ни геология, ни история не фиксируют событие раскола Луны — это классический пример утверждения, которое современная астрономия не подтверждает. Отдельные мусульманские богословы толкуют подобные места метафорически или как описание субъективного зрительного восприятия наблюдателя, а не объективной физики, — эта дискуссия внутри исламской экзегетики продолжается и не имеет единого решения, поэтому справедливо отметить: буквалистское прочтение действительно расходится с современной наукой, но не все течения ислама настаивают на буквализме.</p>

        <p>По свидетельству мусульманской историографии (в частности, «Сиры» Ибн Исхака), после осады иудейского племени Бану Курайза сотни пленных мужчин были казнены, а женщины и дети обращены в рабство; сура 4:24 прямо разрешает интимные отношения с «невольницами, которыми овладели десницы ваши» — то есть с пленницами. Эти сведения происходят не из враждебных исламу источников, а из собственной, авторитетной для мусульман традиции — это придаёт им особый вес именно как предмету серьёзного этического рассмотрения, а не внешней клеветы.</p>`

      {
        q: "Вопрос о чудесах: молчание Корана в сравнении с Евангелием",

        <p>Отдельного рассмотрения заслуживают ритуальные параллели: некоторые исследователи истории религий отмечают структурное сходство исламского намаза с зороастрийской молитвенной практикой, а также дохристианское происхождение хаджа как паломничества к Каабе, бывшей до ислама центром аравийского языческого культа (см. отдельный раздел ниже об истории Каабы). Эти наблюдения указывают на то, что ислам, по всей видимости, не возник в культурном вакууме, а вобрал в себя и переосмыслил ряд более ранних ближневосточных религиозных практик.</p>`

      {
        q: "История Каабы: от языческого святилища к исламской святыне",
        a:`<p>Кааба, объявленная в Коране «Домом Аллаха» (сура 2:125), исторически неоднократно разрушалась и перестраивалась: пожаром до ислама (около 608 г., согласно «Сире» Ибн Хишама), в ходе осады войсками Омейядов (683 г.), наводнением (1630 г.). До возникновения ислама Кааба была центральным святилищем аравийского политеизма, где, по мусульманской же историографии, находилось до 360 идолов, включая изображения Хубала, Аль-Лат, Аль-Уззы и Манат (упомянутых в самом Коране, сура 53:19–20); ритуальный обход святилища (таваф) и почитание вделанного в его стену Чёрного камня (метеоритного происхождения) практиковались арабами-язычниками задолго до Мухаммеда и были сохранены исламом в переосмысленном виде.</p>

function letterBg(chars, testamentClass){
  let out = `<div class="letters-bg">`;
  for(let i=0;i<420;i++){
    const ch = chars[Math.floor(Math.random()*chars.length)];
    const top = Math.random()*100, left = Math.random()*100, size = 1+Math.random()*2.6, rot = Math.random()*360;
    out += `<span style="top:${top}%;left:${left}%;font-size:${size}rem;transform:rotate(${rot}deg);">${ch}</span>`;
  }
  return out + `</div>`;
}

            <button data-tr="lat" class="${trans==='lat'?'active':''}">${TRANSLATION_LABELS.lat}</button>
            <button data-tr="heb" class="${trans==='heb'?'active':''}">${TRANSLATION_LABELS.heb}</button>

        </div>
      </div>

        <select id="bookSelect"></select>
        <select id="chapterSelect"></select>
      </div>
      <div class="chapter-wrap" id="chapterWrap"></div>
    </div>
  `;
  app.querySelector('.testbtns').addEventListener('click', e=>{
    if(e.target.dataset.t){ state.testament=e.target.dataset.t; state.chapter=1; renderBible(app); }
  });
  const transDropdown = document.getElementById('transDropdown');
  document.getElementById('transToggle').addEventListener('click', e=>{
    e.stopPropagation();
    transDropdown.classList.toggle('open');
  });
  transDropdown.querySelector('.trans-menu').addEventListener('click', e=>{
    if(e.target.dataset.tr){
      state.translation = e.target.dataset.tr;
      transDropdown.classList.remove('open');
      loadChapter();
      document.getElementById('transToggle').innerHTML = `<span class="trans-toggle-label">${TRANSLATION_LABELS[state.translation]}</span> <span class="arrow">▾</span>`;
      transDropdown.querySelectorAll('.trans-menu button').forEach(b=>b.classList.toggle('active', b.dataset.tr===state.translation));
    }
  });

  const bookSelect = document.getElementById('bookSelect');
  bookSelect.innerHTML = booksOfTestament.map(b=>`<option value="${b.id}" ${b.id===state.book?'selected':''}>${b.name}</option>`).join('');
  bookSelect.onchange = ()=>{
    state.book = +bookSelect.value;
    state.chapter = 1;
    populateChapterSelect();
    loadChapter();
  };

  populateChapterSelect();
  loadChapter();
}

function populateChapterSelect(){
  const chapterSelect = document.getElementById('chapterSelect');
  const book = BOOKS.find(b=>b.id===state.book);
  if(!book || !chapterSelect) return;
  if(!state.chapter || state.chapter > book.chapters) state.chapter = 1;
  let opts = '';
  for(let c=1;c<=book.chapters;c++){
    opts += `<option value="${c}" ${c===state.chapter?'selected':''}>Глава ${c}</option>`;
  }
  chapterSelect.innerHTML = opts;
  chapterSelect.onchange = ()=>{
    state.chapter = +chapterSelect.value;
    loadChapter();
  };
}

/* Extracts plain text from a helloao.org verse content array
   (strings, {text}, {heading}, {lineBreak}, {noteId} — footnote refs skipped) */
function extractHelloaoVerseText(contentArr){
  return contentArr.map(item=>{
    if(typeof item === 'string') return item;
    if(item && typeof item.text === 'string') return item.text;
    if(item && typeof item.heading === 'string') return item.heading;
    return '';
  }).join(' ').replace(/\s+/g,' ').trim();
}

function renderVerses(wrap, book, verses){
  wrap.classList.toggle('rtl', state.translation === 'heb');
  if(!verses.length){
    wrap.innerHTML = `<div class="missing-note">Текст этой главы не найден.</div>`;
    return;
  }
  let html = `<h2>${book.name}</h2><div class="chapter-sub">Глава ${state.chapter} · ${TRANSLATION_LABELS[state.translation]}</div>`;
  verses.forEach((v, idx)=>{
    const text = v.text;
    if(idx===0 && text.length){
      const first = text.charAt(0);
      const rest = text.slice(1);
      html += `<div class="verse"><span class="vnum">${v.verse}</span><span class="dropcap">${first}</span>${rest}</div>`;
    } else {
      html += `<div class="verse"><span class="vnum">${v.verse}</span>${text}</div>`;
    }
  });
  wrap.innerHTML = html;
}

async function loadChapter(){
  const wrap = document.getElementById('chapterWrap');
  if(!wrap) return;
  const book = BOOKS.find(b=>b.id===state.book);
  wrap.classList.toggle('rtl', state.translation === 'heb');
  wrap.innerHTML = `<div class="missing-note">Загрузка…</div>`;

  try{
    if(state.translation === 'by'){
      /* Belarusian — А. Бокун, 2023, полная Библия, через bible.helloao.org */
      const url = `https://bible.helloao.org/api/bel_jfc/${book.usfm}/${state.chapter}.json`;
      const resp = await fetch(url);
      if(!resp.ok) throw new Error('http-' + resp.status);
      const data = await resp.json();
      const verses = (data.chapter?.content || [])
        .filter(c => c.type === 'verse')
        .map(v => ({ verse: v.number, text: extractHelloaoVerseText(v.content) }));
      renderVerses(wrap, book, verses);
      return;
    }

    /* Синодальный / Новый русский / Украинский / Латынь — через bolls.life,
       у всех этих переводов нумерация книг 1–66 совпадает с BOOKS */
    let code = TRANSLATIONS[state.translation];

    /* Греческий — особый случай: единого перевода на весь канон нет,
       используем LXX (Септуагинту) для Ветхого Завета и Textus Receptus для Нового —
       именно такую пару греческих текстов исторически использует Православие */
    if(state.translation === 'grc'){
      code = (book.t === 'ot') ? 'LXX' : 'TR';
    }
    /* Иврит — та же логика: WLC (масоретский текст) для Ветхого Завета,
       перевод Делича (DHNT) для Нового Завета, которого в оригинале на иврите не было */
    if(state.translation === 'heb'){
      code = (book.t === 'ot') ? 'WLC' : 'DHNT';
    }

    const url = `https://bolls.life/get-text/${code}/${state.book}/${state.chapter}/`;
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('http-' + resp.status);
    const data = await resp.json();
    const verses = Array.isArray(data)
      ? data.map(v => ({ verse: v.verse, text: (v.text || '').replace(/<[^>]+>/g,'') }))
      : [];
    renderVerses(wrap, book, verses);
  }catch(err){
    wrap.innerHTML = `<div class="missing-note">Не удалось загрузить текст главы — нет подключения к интернету или сервис временно недоступен. Проверьте соединение и попробуйте снова, выбрав главу заново.</div>`;
  }
}



/* close translation dropdown on outside click (single delegated listener) */
document.addEventListener('click', ()=>{
  const dd = document.getElementById('transDropdown');
  if(dd) dd.classList.remove('open');
});

/* nav wiring */
document.getElementById('mainnav').addEventListener('click', e=>{
  if(e.target.dataset.r) go(e.target.dataset.r);
});

render();
</script>
